name: Cascade Monitor (5-min)

on:
  schedule:
    # Every 5 minutes, 24/7 — cascade events can happen anytime
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Must complete before next cron fires

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name "Edge Factory Bot"
          git config user.email "bot@edge-factory.dev"

      - name: Run cascade monitor
        run: python monitor_cascade.py
        env:
          TZ: UTC

      - name: Push changes (if any)
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Cascade monitor run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "Nothing to push"
