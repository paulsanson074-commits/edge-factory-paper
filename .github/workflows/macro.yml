name: Macro Monitor (Daily)

on:
  schedule:
    # Run at 21:30 UTC daily (after US market close at 21:00 UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance numpy pandas

      - name: Configure git
        run: |
          git config user.name "Edge Factory Bot"
          git config user.email "bot@edge-factory.dev"

      - name: Run macro monitor
        run: python monitor_macro.py
        env:
          TZ: UTC

      - name: Push changes (if any)
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Macro monitor run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "Nothing to push"
